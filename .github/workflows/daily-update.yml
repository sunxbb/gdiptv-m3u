name: 每日自动生成广东IPTV m3u
# 北京时间凌晨2点执行（UTC 18点）
on:
  schedule:
    # - cron: '0 18 * * *'
    - cron: '0 * * * *'  # 每小时运行一次
  workflow_dispatch: # 支持手动触发测试
jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      # 升级到v5，适配Node24
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: true
      # 升级到v6，移除Node20依赖
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install requirements
        run: pip install requests
      - name: Run process_m3u.py
        run: python process_m3u.py
      # 自动提交更新后的m3u文件
      - name: Commit & Push changes
        run: |
          git config --global user.name "IPTV Bot"
          git config --global user.email "bot@github.com"
          git add GuangdongIPTV_http.m3u
          git commit -m "Auto update m3u $(date +%Y-%m-%d)" || echo "无新频道数据，跳过提交"
          git push
